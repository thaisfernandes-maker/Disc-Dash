<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC · F.O.R.M.A Dia 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');
  :root {
    --bg: #0D1117; --surface: #161B22; --surface2: #1C2330; --border: #2D3748;
    --text: #E6EDF3; --muted: #7D8590; --faint: #3D4451;
    --D: #E8841A; --I: #4ADE80; --S: #60A5FA; --C: #A78BFA;
    --D-bg: #1E1208; --I-bg: #0A1F10; --S-bg: #0A1525; --C-bg: #130E24;
    --green: #1A6B3C;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  .wrap { max-width:680px; margin:0 auto; padding:48px 24px 100px; }

  /* HEADER */
  .badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); padding:5px 14px; border-radius:100px; font-size:11px; font-weight:500; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:24px; }
  .dot { width:6px; height:6px; background:var(--I); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(32px,6vw,52px); font-weight:800; line-height:1.05; letter-spacing:-.02em; margin-bottom:14px; }
  h1 em { font-style:normal; background:linear-gradient(135deg,var(--I),var(--S)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sub { font-size:15px; color:var(--muted); line-height:1.6; font-weight:300; margin-bottom:40px; }

  /* FIELDS */
  .field { margin-bottom:20px; }
  .label { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
  .input { width:100%; background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:13px 16px; font-size:15px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; transition:border-color .2s; }
  .input:focus { border-color:var(--I); }
  .input::placeholder { color:var(--faint); }

  /* PROGRESS */
  .prog-wrap { margin:36px 0 28px; }
  .prog-meta { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:10px; }
  .prog-track { height:3px; background:var(--border); border-radius:100px; overflow:hidden; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--I),var(--S)); border-radius:100px; transition:width .4s cubic-bezier(.4,0,.2,1); width:0%; }

  /* QUESTIONS */
  .q-block { margin-bottom:36px; animation:fadeUp .3s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
  .q-num { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; }
  .q-text { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; color:var(--text); margin-bottom:14px; line-height:1.4; }
  .opts { display:grid; gap:8px; }
  .opt { background:var(--surface); border:1.5px solid var(--border); border-radius:10px; padding:13px 16px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--text); line-height:1.45; text-align:left; transition:all .16s ease; }
  .opt:hover { border-color:var(--muted); transform:translateY(-1px); }
  .opt.sel-D { border-color:var(--D); background:var(--D-bg); color:var(--D); }
  .opt.sel-I { border-color:var(--I); background:var(--I-bg); color:var(--I); }
  .opt.sel-S { border-color:var(--S); background:var(--S-bg); color:var(--S); }
  .opt.sel-C { border-color:var(--C); background:var(--C-bg); color:var(--C); }
  .divider { height:1px; background:var(--border); margin:28px 0; }

  /* SUBMIT */
  .btn { width:100%; padding:15px; background:linear-gradient(135deg,var(--I),#22c55e); border:none; border-radius:10px; font-family:'Syne',sans-serif; font-size:16px; font-weight:700; color:#0D1117; cursor:pointer; transition:all .2s; letter-spacing:.01em; margin-top:8px; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(74,222,128,.28); }
  .btn:disabled { opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-ghost { width:100%; padding:13px; background:transparent; border:1px solid var(--border); border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; color:var(--muted); cursor:pointer; transition:all .2s; margin-top:10px; }
  .btn-ghost:hover { border-color:var(--muted); color:var(--text); }
  .btn-pdf { width:100%; padding:15px; background:linear-gradient(135deg,#3D2478,#4A2D7A); border:none; border-radius:10px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; color:#fff; cursor:pointer; transition:all .2s; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:10px; }
  .btn-pdf:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(74,45,122,.4); }

  /* PRINT / PDF STYLES */
  @media print {
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    html, body { background: #0D1117 !important; margin: 0; padding: 0; }
    #assessment { display: none !important; }
    .btn-pdf, .btn-ghost, .copy-btn { display: none !important; }
    .wrap { max-width: 100% !important; padding: 16px !important; }
    /* force backgrounds to print */
    .surface, .big-card, .scores, .skill-box, .collab-card, .card, .secondary-bar, .score-mini .score-pill, .remote-section { background-color: #161B22 !important; }
    .skill-text { background-color: #0D1117 !important; }
    /* avoid breaking cards across pages */
    .big-card, .scores, .grid2, .collab-card, .skill-box, .secondary-bar, .profile-hero { break-inside: avoid; page-break-inside: avoid; }
    /* give breathing room between sections */
    .big-card, .scores, .grid2, .collab-card { margin-bottom: 14px !important; }
    /* hide animation dot */
    .dot { display: none !important; }
    /* page setup */
    @page { margin: 12mm; size: A4 portrait; }
  }

  /* RESULTS */
  #results { display:none; }
  .profile-hero { display:flex; align-items:flex-start; gap:20px; margin-bottom:28px; }
  .big-letter { font-family:'Syne',sans-serif; font-size:72px; font-weight:800; line-height:1; flex-shrink:0; }
  .profile-meta .who { font-size:12px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
  .profile-meta h2 { font-family:'Syne',sans-serif; font-size:26px; font-weight:700; margin-bottom:8px; }
  .profile-meta .tagline { font-size:14px; color:var(--muted); line-height:1.6; font-style:italic; }

  /* SECONDARY */
  .secondary-bar { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:24px; }
  .sec-badge { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; }
  .sec-info { font-size:13px; color:var(--muted); line-height:1.4; }
  .sec-info strong { color:var(--text); font-weight:500; display:block; margin-bottom:2px; }

  /* SCORES */
  .scores { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:24px; }
  .score-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .score-row:last-child { margin-bottom:0; }
  .sl { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; width:18px; flex-shrink:0; }
  .sn { font-size:12px; color:var(--muted); width:90px; flex-shrink:0; }
  .track { flex:1; height:7px; background:var(--bg); border-radius:100px; overflow:hidden; }
  .fill { height:100%; border-radius:100px; transition:width 1s cubic-bezier(.4,0,.2,1); width:0%; }
  .spct { font-size:12px; font-weight:500; width:34px; text-align:right; flex-shrink:0; }

  /* SECTION TITLE */
  .sec-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:6px; }
  .sec-sub { font-size:13px; color:var(--muted); margin-bottom:18px; }

  /* CARDS 2-col */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; }
  .card-title { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }
  .card ul { list-style:none; display:flex; flex-direction:column; gap:7px; }
  .card ul li { font-size:13px; color:var(--text); display:flex; gap:7px; line-height:1.4; }
  .card ul li::before { content:'→'; flex-shrink:0; opacity:.45; }

  /* BIG CARD */
  .big-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:24px; }
  .big-card-head { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .big-card p { font-size:14px; color:var(--text); line-height:1.7; }
  .big-card .tip-row { padding:12px 14px; background:var(--bg); border-radius:8px; border-left:3px solid; font-size:14px; color:var(--text); line-height:1.55; margin-top:12px; }
  .big-card .tip-row + .tip-row { margin-top:8px; }

  /* COLLAB CARDS */
  .collab-card { border-radius:12px; padding:18px; margin-bottom:10px; border:1px solid; }
  .collab-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .collab-letter { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; }
  .collab-name { font-weight:600; font-size:14px; }
  .collab-body { font-size:13px; color:#9CA3AF; line-height:1.6; padding-left:12px; border-left:2px solid; }

  /* MINI SKILL */
  .skill-box { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:24px; }
  .skill-box-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .skill-box-head .title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; }
  .copy-btn { background:var(--green); border:none; border-radius:8px; padding:7px 14px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:#fff; cursor:pointer; transition:all .2s; flex-shrink:0; }
  .copy-btn:hover { opacity:.85; }
  .copy-btn.copied { background:#266640; }
  .skill-text { font-size:13px; color:var(--muted); line-height:1.7; font-family:monospace; white-space:pre-wrap; word-break:break-word; }

  /* SAVING */
  .saving { text-align:center; padding:20px; font-size:14px; color:var(--muted); }

  @media(max-width:500px) {
    .grid2 { grid-template-columns:1fr; }
    .profile-hero { flex-direction:column; gap:12px; }
    .big-letter { font-size:52px; }
  }
</style>
</head>
<body>
<div class="wrap">

<!-- ASSESSMENT -->

</div>

<!-- RESULTS -->
<div id="results"></div>

</div>

let answers = {};

function render() {
  const c = document.getElementById('qContainer');
  SHUFFLED.forEach((q,qi) => {
    const b = document.createElement('div');
    b.className = 'q-block';
    b.style.animationDelay = qi*0.03+'s';
    b.innerHTML = `<div class="q-num">Situação ${qi+1} de ${SHUFFLED.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="opts" id="opts${qi}">
        ${q.opts.map((o,oi)=>`<button class="opt" onclick="pick(${qi},${oi},'${o.d}')" id="o${qi}_${oi}">${o.t}</button>`).join('')}
      </div>`;
    c.appendChild(b);
    if(qi<SHUFFLED.length-1){const d=document.createElement('div');d.className='divider';c.appendChild(d);}
  });
}

function pick(qi,oi,disc) {
  SHUFFLED[qi].opts.forEach((_,i)=>{
    const b=document.getElementById(`o${qi}_${i}`);
    b.className='opt';
  });
  document.getElementById(`o${qi}_${oi}`).className=`opt sel-${disc}`;
  answers[qi]=disc;
  const n=Object.keys(answers).length;
  const p=Math.round(n/SHUFFLED.length*100);
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progTxt').textContent=`${n} de ${SHUFFLED.length} respondidas`;
  document.getElementById('progPct').textContent=p+'%';
  document.getElementById('submitBtn').disabled=n<SHUFFLED.length;
}

function calcScores() {
  const s={D:0,I:0,S:0,C:0};
  Object.values(answers).forEach(d=>s[d]++);
  const total=SHUFFLED.length;
  const pct={D:Math.round(s.D/total*100),I:Math.round(s.I/total*100),S:Math.round(s.S/total*100),C:Math.round(s.C/total*100)};
  const sorted=Object.entries(s).sort((a,b)=>b[1]-a[1]);
  return {raw:s,pct,dominant:sorted[0][0],secondary:sorted[1][0]};
}

async function saveToSupabase(data) {
  const doFetch = () => fetch(`${SUPABASE_URL}/rest/v1/disc_results`, {
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':SUPABASE_KEY,
      'Authorization':`Bearer ${SUPABASE_KEY}`,
      'Prefer':'return=representation'
    },
    body:JSON.stringify(data)
  });
  // Try up to 3 times — project may need a moment to wake from inactive
  for(let i=0; i<3; i++){
    try {
      const res = await doFetch();
      if(res.ok) return true;
      const err = await res.text();
      console.warn(`Supabase attempt ${i+1} failed:`, res.status, err);
    } catch(e) {
      console.warn(`Supabase attempt ${i+1} error:`, e.message);
    }
    if(i<2) await new Promise(r=>setTimeout(r,1500)); // wait 1.5s before retry
  }
  return false;
}

function copySkill() {

    setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('copied');},2500);
  });
}

.score-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.score-row:last-child{margin-bottom:0;}
.sl{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;width:18px;}
.sn{font-size:12px;color:var(--muted);width:90px;}
.track{flex:1;height:7px;background:var(--bg);border-radius:100px;overflow:hidden;}
.fill{height:100%;border-radius:100px;}
.spct{font-size:12px;font-weight:500;width:34px;text-align:right;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.card ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
.card ul li{font-size:13px;color:var(--text);display:flex;gap:7px;line-height:1.4;}
.card ul li::before{content:'→';flex-shrink:0;opacity:.45;}
.big-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:24px;}
.big-card-head{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.big-card p{font-size:14px;color:var(--text);line-height:1.7;}
.tip-row{padding:12px 14px;background:var(--bg);border-radius:8px;border-left:3px solid;font-size:14px;color:var(--text);line-height:1.55;margin-top:12px;}
.sec-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}
.collab-card{border-radius:12px;padding:18px;margin-bottom:10px;border:1px solid;}
.collab-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.collab-letter{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.collab-name{font-weight:600;font-size:14px;}
.collab-body{font-size:13px;color:#9CA3AF;line-height:1.6;padding-left:12px;border-left:2px solid;}
.skill-box{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:24px;}
.skill-box-head{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;}
.skill-text{font-size:13px;color:var(--muted);line-height:1.7;font-family:monospace;white-space:pre-wrap;word-break:break-word;}
.footer{text-align:center;font-size:11px;color:var(--faint);margin-top:40px;padding-top:20px;border-top:1px solid var(--border);}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#0D1117!important;}
  .grid2{break-inside:avoid;}
  .big-card{break-inside:avoid;}
  .collab-card{break-inside:avoid;}
  .scores{break-inside:avoid;}
  .skill-box{break-inside:avoid;}
  @page{margin:12mm;size:A4 portrait;}
}
